<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 600px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部 Header */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        /* 标签页导航 */
        .tab-nav {
            display: flex;
            background: #f7f7f7;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            background: transparent;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            position: relative;
            transition: color 0.25s;
        }

        .tab-btn:hover {
            color: #555;
        }

        .tab-btn.active {
            color: #667eea;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .tab-btn + .tab-btn {
            border-left: 1px solid #e0e0e0;
        }

        /* 标签页内容区 */
        .tab-content {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
        }

        /* ---- 聊天页 ---- */
        .mode-switch {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: #f7f7f7;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
        }

        .mode-switch label {
            font-size: 14px;
            color: #666;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: 0.4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #667eea;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message.assistant .message-avatar {
            background: #f0f0f0;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: #f0f0f0;
            color: #333;
        }

        .message.error .message-content {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .input-area {
            padding: 20px;
            background: #f7f7f7;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        #messageInput {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #messageInput:focus {
            border-color: #667eea;
        }

        #sendButton {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.3s;
        }

        #sendButton:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        #sendButton:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-10px); }
        }

        /* ---- 知识库页 ---- */
        .knowledge-page {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .knowledge-page h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 4px;
        }

        .knowledge-page .desc {
            font-size: 13px;
            color: #888;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #667eea;
            background: #f5f3ff;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 14px;
            color: #666;
        }

        .upload-hint {
            font-size: 12px;
            color: #aaa;
            margin-top: 6px;
        }

        .file-list-section h3 {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
        }

        .file-item .file-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #444;
        }

        .file-item .file-status {
            margin-left: 10px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .file-item .file-status.success   { color: #22c55e; }
        .file-item .file-status.error     { color: #ef4444; }
        .file-item .file-status.uploading { color: #667eea; }

        .empty-hint {
            text-align: center;
            color: #bbb;
            font-size: 13px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 顶部标题 -->
        <div class="chat-header">🤖 AI 聊天助手</div>

        <!-- 标签页导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="chat">💬 聊天</button>
            <button class="tab-btn" data-tab="knowledge">📚 知识库</button>
        </div>

        <!-- 聊天标签页 -->
        <div class="tab-content active" id="tab-chat">
            <div class="mode-switch">
                <label>非流式</label>
                <label class="switch">
                    <input type="checkbox" id="streamMode" checked>
                    <span class="slider"></span>
                </label>
                <label>流式</label>
            </div>
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">你好！我是 AI 助手，有什么可以帮助你的吗？</div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="输入你的问题..." autocomplete="off">
                </div>
                <button id="sendButton">发送</button>
            </div>
        </div>

        <!-- 知识库标签页 -->
        <div class="tab-content" id="tab-knowledge">
            <div class="knowledge-page">
                <div>
                    <h2>知识库管理</h2>
                    <p class="desc">上传文档后，AI 将基于文档内容为你提供更精准的回答。</p>
                </div>
                <div class="upload-area" id="uploadArea">
                    <input type="file" id="fileInput" accept=".txt,.md" multiple>
                    <div class="upload-icon">📄</div>
                    <div class="upload-text">点击或拖拽文件到此处上传</div>
                    <div class="upload-hint">支持 .txt、.md 格式，单个文件最大 10MB</div>
                </div>
                <div class="file-list-section">
                    <h3>上传记录</h3>
                    <div class="file-list" id="fileList">
                        <div class="empty-hint" id="emptyHint">暂无上传文件</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        const SESSION_ID   = 'session_' + Date.now();

        // ========== 标签页切换 ==========
        const tabBtns     = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                tabBtns.forEach(b  => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${target}`).classList.add('active');
                if (target === 'chat') messageInput.focus();
            });
        });

        // ========== 聊天模块 ==========
        const messagesContainer   = document.getElementById('messages');
        const messageInput        = document.getElementById('messageInput');
        const sendButton          = document.getElementById('sendButton');
        const streamModeCheckbox  = document.getElementById('streamMode');

        function addMessage(role, content, isError = false) {
            const messageDiv  = document.createElement('div');
            messageDiv.className = `message ${role}${isError ? ' error' : ''}`;

            const avatar  = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const contentDiv  = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return contentDiv;
        }

        function addTypingIndicator() {
            const messageDiv  = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'typing-indicator';

            const avatar  = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const indicator  = document.createElement('div');
            indicator.className = 'message-content typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(indicator);
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        async function sendNormalChat(question) {
            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Id: SESSION_ID, Question: question })
                });
                const result = await response.json();
                removeTypingIndicator();
                if (result.code === 200 && result.data.success) {
                    addMessage('assistant', result.data.answer);
                } else {
                    addMessage('assistant', result.data.errorMessage || '请求失败', true);
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '网络错误: ' + error.message, true);
            }
        }

        async function sendStreamChat(question) {
            try {
                const response = await fetch(`${API_BASE_URL}/stream_chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Id: SESSION_ID, Question: question })
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                removeTypingIndicator();
                const contentDiv = addMessage('assistant', '');
                const reader  = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.content) {
                                    contentDiv.textContent += data.content;
                                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                                }
                            } catch (e) {
                                console.error('解析 SSE 数据失败:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '网络错误: ' + error.message, true);
            }
        }

        async function sendMessage() {
            const question = messageInput.value.trim();
            if (!question) return;

            addMessage('user', question);
            messageInput.value = '';
            messageInput.disabled = true;
            sendButton.disabled   = true;
            addTypingIndicator();

            if (streamModeCheckbox.checked) {
                await sendStreamChat(question);
            } else {
                await sendNormalChat(question);
            }

            messageInput.disabled = false;
            sendButton.disabled   = false;
            messageInput.focus();
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // ========== 知识库模块 ==========
        const uploadArea = document.getElementById('uploadArea');
        const fileInput  = document.getElementById('fileInput');
        const fileList   = document.getElementById('fileList');
        const emptyHint  = document.getElementById('emptyHint');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                handleFiles(fileInput.files);
                fileInput.value = '';
            }
        });

        async function handleFiles(files) {
            for (const file of files) {
                const item = addFileItem(file.name);
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    setStatus(item, '上传中...', 'uploading');

                    const response = await fetch(`${API_BASE_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    const result = await response.json();

                    if (response.ok && result.code === 200) {
                        setStatus(item, '✓ 上传成功', 'success');
                    } else {
                        const msg = result.detail || result.message || '上传失败';
                        setStatus(item, `✗ ${msg}`, 'error');
                    }
                } catch (error) {
                    setStatus(item, '✗ 网络错误', 'error');
                }
            }
        }

        function addFileItem(name) {
            if (emptyHint) emptyHint.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span class="file-name">${name}</span><span class="file-status uploading">上传中...</span>`;
            fileList.prepend(div);
            return div;
        }

        function setStatus(item, text, cls) {
            const status = item.querySelector('.file-status');
            status.textContent  = text;
            status.className    = `file-status ${cls}`;
        }

        // 自动聚焦输入框
        messageInput.focus();
    </script>
</body>
</html>
