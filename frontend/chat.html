<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聊天助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center; padding: 12px;
        }
        .app-container {
            width: 100%; max-width: 1500px; height: calc(100vh - 24px); min-height: 500px;
            background: white; border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            display: flex; overflow: hidden;
        }
        /* ===== 左侧会话列表 ===== */
        .sidebar {
            width: 280px; background: #f8f9fa; border-right: 1px solid #e0e0e0;
            display: flex; flex-direction: column; flex-shrink: 0;
        }
        .sidebar-header {
            padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; display: flex; align-items: center; justify-content: space-between;
        }
        .sidebar-header h2 { font-size: 16px; font-weight: 600; }
        .new-session-btn {
            background: rgba(255,255,255,.25); border: none; color: white;
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px;
            transition: background .2s;
        }
        .new-session-btn:hover { background: rgba(255,255,255,.4); }
        .session-list {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .session-item {
            padding: 10px 12px; border-radius: 10px; cursor: pointer;
            margin-bottom: 4px; transition: background .2s;
            display: flex; flex-direction: column; gap: 4px; position: relative;
        }
        .session-item:hover { background: #e8e8e8; }
        .session-item.active { background: #e0e0f5; }
        .session-item .session-title {
            font-size: 13px; font-weight: 500; color: #333;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            padding-right: 50px;
        }
        .session-item .session-time {
            font-size: 11px; color: #999;
        }
        .session-item .session-status {
            font-size: 10px; padding: 1px 6px; border-radius: 4px; position: absolute;
            top: 10px; right: 10px;
        }
        .session-item .session-status.active { background: #dcfce7; color: #16a34a; }
        .session-item .session-status.closed { background: #f1f1f1; color: #999; }
        .session-item .session-actions {
            position: absolute; top: 8px; right: 10px; display: none; gap: 4px;
        }
        .session-item:hover .session-actions { display: flex; }
        .session-item:hover .session-status { display: none; }
        .session-actions button {
            border: none; background: none; cursor: pointer; font-size: 14px;
            padding: 2px 4px; border-radius: 4px; transition: background .2s;
        }
        .session-actions button:hover { background: rgba(0,0,0,.1); }
        .session-empty { text-align: center; color: #bbb; font-size: 13px; padding: 40px 16px; }

        /* ===== 右侧主区域 ===== */
        .main-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; padding: 14px 20px; font-size: 16px; font-weight: 600;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .chat-header .header-left { display: flex; align-items: center; gap: 10px; }
        .chat-header .header-right { display: flex; align-items: center; gap: 8px; }
        .chat-header .header-right button {
            background: rgba(255,255,255,.2); border: none; color: white;
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
            transition: background .2s;
        }
        .chat-header .header-right button:hover { background: rgba(255,255,255,.35); }
        .tab-nav {
            display: flex; background: #f7f7f7; border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
        }
        .tab-btn {
            flex: 1; padding: 10px 0; border: none; background: transparent;
            font-size: 13px; font-weight: 600; color: #888; cursor: pointer;
            position: relative; transition: color .25s;
        }
        .tab-btn:hover { color: #555; }
        .tab-btn.active { color: #667eea; }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 3px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 2px;
        }
        .tab-btn + .tab-btn { border-left: 1px solid #e0e0e0; }
        .tab-content { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* 聊天页 */
        .mode-switch {
            display: flex; justify-content: center; align-items: center; gap: 10px;
            padding: 8px 20px; background: #f7f7f7; border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
        }
        .mode-switch label { font-size: 13px; color: #666; }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #667eea; }
        input:checked + .slider:before { transform: translateX(24px); }

        .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; gap: 10px; animation: fadeIn .3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { flex-direction: row-reverse; }
        .message-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
        }
        .message.user .message-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .message.assistant .message-avatar { background: #f0f0f0; }
        .message-content { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.7; word-wrap: break-word; font-size: 14px; }
        .message.user .message-content { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .message.assistant .message-content { background: #f0f0f0; color: #333; }
        /* ===== Markdown 渲染样式 ===== */
        .message.assistant .message-content h1,
        .message.assistant .message-content h2,
        .message.assistant .message-content h3,
        .message.assistant .message-content h4 { margin: 14px 0 6px; font-weight: 600; line-height: 1.4; }
        .message.assistant .message-content h1 { font-size: 1.3em; }
        .message.assistant .message-content h2 { font-size: 1.15em; }
        .message.assistant .message-content h3 { font-size: 1.05em; }
        .message.assistant .message-content p { margin: 6px 0; }
        .message.assistant .message-content ul,
        .message.assistant .message-content ol { margin: 6px 0; padding-left: 1.5em; }
        .message.assistant .message-content li { margin: 3px 0; }
        .message.assistant .message-content code {
            background: #e2e2e2; padding: 1px 5px; border-radius: 4px; font-size: 0.9em;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }
        .message.assistant .message-content pre {
            background: #282c34; color: #abb2bf; padding: 12px 14px; border-radius: 8px;
            overflow-x: auto; margin: 8px 0; font-size: 13px; line-height: 1.5;
        }
        .message.assistant .message-content pre code {
            background: none; padding: 0; color: inherit; font-size: inherit;
        }
        .message.assistant .message-content blockquote {
            border-left: 3px solid #667eea; margin: 8px 0; padding: 4px 12px; color: #555;
            background: #f9f9f9; border-radius: 0 6px 6px 0;
        }
        .message.assistant .message-content table {
            border-collapse: collapse; margin: 8px 0; width: 100%; font-size: 13px;
        }
        .message.assistant .message-content th,
        .message.assistant .message-content td {
            border: 1px solid #ddd; padding: 6px 10px; text-align: left;
        }
        .message.assistant .message-content th { background: #e8e8e8; font-weight: 600; }
        .message.assistant .message-content a { color: #667eea; text-decoration: none; }
        .message.assistant .message-content a:hover { text-decoration: underline; }
        .message.assistant .message-content hr { border: none; border-top: 1px solid #ddd; margin: 10px 0; }
        .message.assistant .message-content img { max-width: 100%; border-radius: 6px; }
        .message.error .message-content { background: #fee; color: #c33; border: 1px solid #fcc; }
        .message-time { font-size: 10px; color: #bbb; align-self: flex-end; margin-top: 2px; }
        .message.user .message-time { align-self: flex-start; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .message.user .message-wrapper { align-items: flex-end; }

        .input-area {
            padding: 14px 20px; background: #f7f7f7; border-top: 1px solid #e0e0e0;
            display: flex; gap: 10px; flex-shrink: 0; align-items: flex-end;
        }
        .input-wrapper { flex: 1; }
        #messageInput {
            width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0;
            border-radius: 16px; font-size: 14px; outline: none; transition: border-color .3s;
            resize: none; font-family: inherit; line-height: 1.5;
            min-height: 44px; max-height: 160px; overflow-y: auto;
        }
        #messageInput:focus { border-color: #667eea; }
        #sendButton {
            padding: 10px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 24px; cursor: pointer; font-size: 13px;
            font-weight: 600; transition: transform .2s, opacity .3s;
        }
        #sendButton:hover:not(:disabled) { transform: translateY(-2px); }
        #sendButton:disabled { opacity: .6; cursor: not-allowed; }
        .typing-indicator { display: flex; gap: 4px; padding: 10px 14px; }
        .typing-indicator span {
            width: 8px; height: 8px; border-radius: 50%; background: #999; animation: typing 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; }
        @keyframes typing { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }

        /* 知识库页 */
        .knowledge-page { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
        .knowledge-page h2 { font-size: 16px; color: #333; }
        .knowledge-page .desc { font-size: 12px; color: #888; }
        .upload-area {
            border: 2px dashed #ccc; border-radius: 12px; padding: 30px 20px;
            text-align: center; cursor: pointer; transition: all .3s; position: relative;
        }
        .upload-area:hover, .upload-area.dragover { border-color: #667eea; background: #f5f3ff; }
        .upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .upload-icon { font-size: 36px; margin-bottom: 8px; }
        .upload-text { font-size: 13px; color: #666; }
        .upload-hint { font-size: 11px; color: #aaa; margin-top: 4px; }
        .doc-list-section h3 {
            font-size: 13px; color: #555; margin-bottom: 8px; font-weight: 600;
            display: flex; align-items: center; justify-content: space-between;
        }
        .doc-list-section h3 .refresh-btn {
            font-size: 12px; font-weight: 400; color: #667eea; background: none;
            border: none; cursor: pointer; padding: 2px 6px;
        }
        .doc-list-section h3 .refresh-btn:hover { text-decoration: underline; }
        .doc-file-list { display: flex; flex-direction: column; gap: 6px; }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            background: #fff; border: 1px solid #e8e8e8; border-radius: 10px;
            padding: 8px 12px; font-size: 12px;
        }
        .file-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #444; }
        .file-item .file-status { margin-left: 10px; font-size: 11px; flex-shrink: 0; }
        .file-item .file-status.success { color: #22c55e; }
        .file-item .file-status.error { color: #ef4444; }
        .file-item .file-status.uploading { color: #667eea; }
        .file-item .file-info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 2px; }
        .file-item .file-chunks { font-size: 10px; color: #999; }
        .file-item .delete-btn {
            margin-left: 10px; padding: 3px 8px; border: 1px solid #ef4444; border-radius: 6px;
            background: white; color: #ef4444; font-size: 11px; cursor: pointer; flex-shrink: 0;
            transition: all .2s;
        }
        .file-item .delete-btn:hover { background: #ef4444; color: white; }
        .file-item .delete-btn:disabled { opacity: .5; cursor: not-allowed; }
        .file-list-section h3 { font-size: 13px; color: #555; margin-bottom: 8px; font-weight: 600; }
        .file-list { display: flex; flex-direction: column; gap: 6px; }
        .empty-hint { text-align: center; color: #bbb; font-size: 12px; padding: 16px 0; }
        .no-session-hint {
            flex: 1; display: flex; align-items: center; justify-content: center;
            color: #bbb; font-size: 14px; flex-direction: column; gap: 12px;
        }
        .no-session-hint button {
            padding: 8px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧会话列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>会话列表</h2>
                <button class="new-session-btn" id="newSessionBtn">+ 新建</button>
            </div>
            <div class="session-list" id="sessionList">
                <div class="session-empty" id="sessionEmpty">暂无会话记录</div>
            </div>
        </div>

        <!-- 右侧主区域 -->
        <div class="main-area">
            <div class="chat-header">
                <div class="header-left">
                    <span id="chatTitle">🤖 AI 聊天助手</span>
                </div>
                <div class="header-right">
                    <button id="restartBtn" style="display:none;" title="重启会话（新开会话）">🔄 重启</button>
                    <button id="deleteSessionBtn" style="display:none;" title="删除当前会话">🗑 删除</button>
                </div>
            </div>
            <!-- 标签页导航 -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="chat">💬 聊天</button>
                <button class="tab-btn" data-tab="knowledge">📚 知识库</button>
            </div>

            <!-- 聊天标签页 -->
            <div class="tab-content active" id="tab-chat">
                <div class="mode-switch">
                    <label>非流式</label>
                    <label class="switch">
                        <input type="checkbox" id="streamMode" checked>
                        <span class="slider"></span>
                    </label>
                    <label>流式</label>
                </div>
                <div class="messages" id="messages">
                    <div class="no-session-hint" id="noSessionHint">
                        <span>请从左侧选择或新建一个会话</span>
                        <button onclick="createNewSession()">新建会话</button>
                    </div>
                </div>
                <div class="input-area" id="inputArea" style="display:none;">
                    <div class="input-wrapper">
                        <textarea id="messageInput" placeholder="输入你的问题...（Shift+Enter 换行，Enter 发送）" rows="1" autocomplete="off"></textarea>
                    </div>
                    <button id="sendButton">发送</button>
                </div>
            </div>

            <!-- 知识库标签页 -->
            <div class="tab-content" id="tab-knowledge">
                <div class="knowledge-page">
                    <div>
                        <h2>知识库管理</h2>
                        <p class="desc">上传文档后，AI 将基于文档内容为你提供更精准的回答。</p>
                    </div>
                    <div class="doc-list-section">
                        <h3>
                            <span>知识库文档</span>
                            <button class="refresh-btn" id="refreshDocBtn">刷新</button>
                        </h3>
                        <div class="doc-file-list" id="docFileList">
                            <div class="empty-hint" id="docEmptyHint">暂无知识库文档</div>
                        </div>
                    </div>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" accept=".txt,.md,.pdf" multiple>
                        <div class="upload-icon"></div>
                        <div class="upload-text">点击或拖拽文件到此处上传</div>
                        <div class="upload-hint">支持 .txt、.md、.pdf 格式，单个文件最大 10MB</div>
                    </div>
                    <div class="file-list-section">
                        <h3>上传记录</h3>
                        <div class="file-list" id="fileList">
                            <div class="empty-hint" id="emptyHint">暂无上传文件</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        const API_BASE_URL = 'http://localhost:8000/api/v1';
        let CURRENT_SESSION_ID = null;

        // ========== DOM ==========
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const streamModeCheckbox = document.getElementById('streamMode');
        const sessionList = document.getElementById('sessionList');
        const sessionEmpty = document.getElementById('sessionEmpty');
        const noSessionHint = document.getElementById('noSessionHint');
        const inputArea = document.getElementById('inputArea');
        const chatTitle = document.getElementById('chatTitle');
        const restartBtn = document.getElementById('restartBtn');
        const deleteSessionBtn = document.getElementById('deleteSessionBtn');

        // ========== 标签页切换 ==========
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${target}`).classList.add('active');
                if (target === 'chat') messageInput.focus();
                if (target === 'knowledge') loadDocuments();
            });
        });

        // ========== 会话管理 ==========
        async function loadSessions() {
            try {
                const res = await fetch(`${API_BASE_URL}/sessions`);
                const result = await res.json();
                if (result.code === 200) {
                    renderSessions(result.data);
                }
            } catch (e) { console.error('加载会话列表失败:', e); }
        }

        function renderSessions(sessions) {
            sessionList.innerHTML = '';
            if (!sessions || sessions.length === 0) {
                sessionList.innerHTML = '<div class="session-empty">暂无会话记录</div>';
                return;
            }
            sessions.forEach(s => {
                const div = document.createElement('div');
                div.className = 'session-item' + (s.session_id === CURRENT_SESSION_ID ? ' active' : '');
                const timeStr = s.update_time ? new Date(s.update_time).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
                div.innerHTML = `
                    <span class="session-status ${s.status}">${s.status === 'active' ? '活跃' : '已关闭'}</span>
                    <div class="session-actions">
                        <button title="重启" onclick="event.stopPropagation(); restartSession('${s.session_id}')">🔄</button>
                        <button title="删除" onclick="event.stopPropagation(); deleteSession('${s.session_id}')">🗑</button>
                    </div>
                    <div class="session-title">${escapeHtml(s.title)}</div>
                    <div class="session-time">${timeStr}</div>
                `;
                div.addEventListener('click', () => switchSession(s.session_id, s.title, s.status));
                sessionList.appendChild(div);
            });
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        async function createNewSession() {
            try {
                const res = await fetch(`${API_BASE_URL}/sessions`, { method: 'POST' });
                const result = await res.json();
                if (result.code === 200) {
                    CURRENT_SESSION_ID = result.data.session_id;
                    chatTitle.textContent = '🤖 ' + result.data.title;
                    messagesContainer.innerHTML = '';
                    addWelcomeMessage();
                    noSessionHint.style.display = 'none';
                    inputArea.style.display = 'flex';
                    restartBtn.style.display = 'inline-block';
                    deleteSessionBtn.style.display = 'inline-block';
                    messageInput.focus();
                    await loadSessions();
                }
            } catch (e) { console.error('创建会话失败:', e); }
        }

        async function switchSession(sessionId, title, status) {
            if (sessionId === CURRENT_SESSION_ID) return;
            CURRENT_SESSION_ID = sessionId;
            chatTitle.textContent = '🤖 ' + title;
            noSessionHint.style.display = 'none';
            inputArea.style.display = 'flex';
            restartBtn.style.display = 'inline-block';
            deleteSessionBtn.style.display = 'inline-block';
            // 高亮
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            const items = sessionList.querySelectorAll('.session-item');
            items.forEach(el => { if (el.querySelector('.session-title')?.textContent === title) el.classList.add('active'); });
            // 加载历史消息
            await loadMessages(sessionId);
            // 重新渲染高亮
            await loadSessions();
        }

        async function loadMessages(sessionId) {
            try {
                const res = await fetch(`${API_BASE_URL}/sessions/${sessionId}/messages`);
                const result = await res.json();
                messagesContainer.innerHTML = '';
                if (result.code === 200 && result.data.messages.length > 0) {
                    result.data.messages.forEach(m => {
                        addMessageWithTime(m.role, m.content, m.create_time);
                    });
                } else {
                    addWelcomeMessage();
                }
            } catch (e) {
                console.error('加载消息失败:', e);
                messagesContainer.innerHTML = '';
                addWelcomeMessage();
            }
        }

        async function restartSession(sessionId) {
            if (!confirm('确定要重启会话吗？将创建一个新会话。')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/sessions/${sessionId}/restart`, { method: 'POST' });
                const result = await res.json();
                if (result.code === 200) {
                    CURRENT_SESSION_ID = result.data.new_session_id;
                    chatTitle.textContent = '🤖 ' + result.data.title;
                    messagesContainer.innerHTML = '';
                    addWelcomeMessage();
                    await loadSessions();
                }
            } catch (e) { console.error('重启会话失败:', e); }
        }

        async function deleteSession(sessionId) {
            if (!confirm('确定要删除该会话及其所有消息吗？')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/sessions/${sessionId}`, { method: 'DELETE' });
                const result = await res.json();
                if (result.code === 200) {
                    if (sessionId === CURRENT_SESSION_ID) {
                        CURRENT_SESSION_ID = null;
                        messagesContainer.innerHTML = '<div class="no-session-hint" id="noSessionHint"><span>请从左侧选择或新建一个会话</span><button onclick="createNewSession()">新建会话</button></div>';
                        inputArea.style.display = 'none';
                        restartBtn.style.display = 'none';
                        deleteSessionBtn.style.display = 'none';
                        chatTitle.textContent = '🤖 AI 聊天助手';
                    }
                    await loadSessions();
                }
            } catch (e) { console.error('删除会话失败:', e); }
        }

        // Header buttons
        restartBtn.addEventListener('click', () => { if (CURRENT_SESSION_ID) restartSession(CURRENT_SESSION_ID); });
        deleteSessionBtn.addEventListener('click', () => { if (CURRENT_SESSION_ID) deleteSession(CURRENT_SESSION_ID); });
        document.getElementById('newSessionBtn').addEventListener('click', createNewSession);

        // ========== 聊天模块 ==========
        // Markdown 渲染配置
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });

        function renderMarkdown(text) {
            try { return marked.parse(text); } catch (e) { return escapeHtml(text); }
        }

        function addWelcomeMessage() {
            addMessage('assistant', '你好！我是 AI 助手，有什么可以帮助你的吗？');
        }

        function addMessage(role, content, isError = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}${isError ? ' error' : ''}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const msgWrapper = document.createElement('div');
            msgWrapper.className = 'message-wrapper';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (role === 'assistant' && !isError) {
                contentDiv.innerHTML = renderMarkdown(content);
            } else {
                contentDiv.textContent = content;
            }
            msgWrapper.appendChild(contentDiv);

            wrapper.appendChild(avatar);
            wrapper.appendChild(msgWrapper);
            messagesContainer.appendChild(wrapper);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return contentDiv;
        }

        function addMessageWithTime(role, content, timeStr) {
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';

            const msgWrapper = document.createElement('div');
            msgWrapper.className = 'message-wrapper';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            if (role === 'assistant') {
                contentDiv.innerHTML = renderMarkdown(content);
            } else {
                contentDiv.textContent = content;
            }
            msgWrapper.appendChild(contentDiv);

            if (timeStr) {
                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                timeDiv.textContent = new Date(timeStr).toLocaleString('zh-CN');
                msgWrapper.appendChild(timeDiv);
            }

            wrapper.appendChild(avatar);
            wrapper.appendChild(msgWrapper);
            messagesContainer.appendChild(wrapper);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return contentDiv;
        }

        function addTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message assistant';
            wrapper.id = 'typing-indicator';
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';
            const indicator = document.createElement('div');
            indicator.className = 'message-content typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            wrapper.appendChild(avatar);
            wrapper.appendChild(indicator);
            messagesContainer.appendChild(wrapper);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        async function sendNormalChat(question) {
            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Id: CURRENT_SESSION_ID, Question: question })
                });
                const result = await response.json();
                removeTypingIndicator();
                if (result.code === 200 && result.data.success) {
                    addMessage('assistant', result.data.answer);
                } else {
                    addMessage('assistant', result.data.errorMessage || '请求失败', true);
                }
                loadSessions(); // 刷新侧边栏
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '网络错误: ' + error.message, true);
            }
        }

        async function sendStreamChat(question) {
            try {
                const response = await fetch(`${API_BASE_URL}/stream_chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Id: CURRENT_SESSION_ID, Question: question })
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                removeTypingIndicator();
                const contentDiv = addMessage('assistant', '');
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullContent = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.substring(6));
                                if (data.content) {
                                    fullContent += data.content;
                                    contentDiv.innerHTML = renderMarkdown(fullContent);
                                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                                }
                            } catch (e) { console.error('解析 SSE 数据失败:', e); }
                        }
                    }
                }
                loadSessions(); // 刷新侧边栏
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', '网络错误: ' + error.message, true);
            }
        }

        async function sendMessage() {
            if (!CURRENT_SESSION_ID) { alert('请先创建或选择一个会话'); return; }
            const question = messageInput.value.trim();
            if (!question) return;
            addMessage('user', question);
            messageInput.value = '';
            messageInput.disabled = true;
            sendButton.disabled = true;
            addTypingIndicator();
            if (streamModeCheckbox.checked) {
                await sendStreamChat(question);
            } else {
                await sendNormalChat(question);
            }
            messageInput.disabled = false;
            sendButton.disabled = false;
            messageInput.focus();
        }

        sendButton.addEventListener('click', sendMessage);
        // textarea 自适应高度 + 发送逻辑
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
        });
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        // ========== 知识库模块 ==========
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const emptyHint = document.getElementById('emptyHint');
        const docFileList = document.getElementById('docFileList');
        const refreshDocBtn = document.getElementById('refreshDocBtn');

        async function loadDocuments() {
            try {
                const response = await fetch(`${API_BASE_URL}/documents`);
                const result = await response.json();
                if (result.code === 200 && Array.isArray(result.data)) renderDocList(result.data);
            } catch (error) { console.error('加载文档列表失败:', error); }
        }

        function renderDocList(docs) {
            docFileList.innerHTML = '';
            if (docs.length === 0) { docFileList.innerHTML = '<div class="empty-hint">暂无知识库文档</div>'; return; }
            docs.forEach(doc => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">${doc.doc_name}</span>
                        <span class="file-chunks">分片数: ${doc.chunk_count} | 版本: ${doc.version} | 状态: ${doc.status}</span>
                    </div>
                    <button class="delete-btn" data-id="${doc.id}" data-name="${doc.doc_name}">删除</button>
                `;
                div.querySelector('.delete-btn').addEventListener('click', () => deleteDocument(doc.id, doc.doc_name, div));
                docFileList.appendChild(div);
            });
        }

        async function deleteDocument(id, name, element) {
            if (!confirm(`确定要删除文档「${name}」吗？`)) return;
            const btn = element.querySelector('.delete-btn');
            btn.disabled = true; btn.textContent = '删除中...';
            try {
                const response = await fetch(`${API_BASE_URL}/documents/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (response.ok && result.code === 200) {
                    element.remove();
                    if (docFileList.children.length === 0) docFileList.innerHTML = '<div class="empty-hint">暂无知识库文档</div>';
                } else { alert(result.detail || '删除失败'); btn.disabled = false; btn.textContent = '删除'; }
            } catch (error) { alert('网络错误: ' + error.message); btn.disabled = false; btn.textContent = '删除'; }
        }

        refreshDocBtn.addEventListener('click', loadDocuments);
        uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault(); uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length > 0) { handleFiles(fileInput.files); fileInput.value = ''; } });

        async function handleFiles(files) {
            for (const file of files) {
                const item = addFileItem(file.name);
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    setStatus(item, '上传中...', 'uploading');
                    const response = await fetch(`${API_BASE_URL}/upload`, { method: 'POST', body: formData });
                    const result = await response.json();
                    if (response.ok && result.code === 200) { setStatus(item, '✓ 上传成功', 'success'); loadDocuments(); }
                    else { setStatus(item, `✗ ${result.detail || result.message || '上传失败'}`, 'error'); }
                } catch (error) { setStatus(item, '✗ 网络错误', 'error'); }
            }
        }

        function addFileItem(name) {
            if (emptyHint) emptyHint.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `<span class="file-name">${name}</span><span class="file-status uploading">上传中...</span>`;
            fileList.prepend(div);
            return div;
        }

        function setStatus(item, text, cls) {
            const status = item.querySelector('.file-status');
            status.textContent = text;
            status.className = `file-status ${cls}`;
        }

        // ========== 初始化 ==========
        loadSessions();
        messageInput.focus();
    </script>
</body>
</html>
